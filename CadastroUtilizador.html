<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Utilizador</title>
    <link rel="stylesheet" href="CadastroUtilizador.css">
</head>
<body>

    <header></header>

    <main>
        <div class="card">
            <form class="formulario">
                <h1>Cadastro</h1>

                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="fulano@email.com" required>

                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Fulano da Silva" required>

                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="********" required>

                <label for="repitaSenha">Repita a Senha</label>
                <input type="password" id="repitaSenha" placeholder="********" required>

                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </main>

    <footer></footer>

</body>
</html>
