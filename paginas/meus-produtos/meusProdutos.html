<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoEscambo - Meus Produtos</title>
    <link rel="stylesheet" href="meusProdutos.css">
</head>
<body>

    <div class="banner-verde"></div>

    <div id="site-navbar"></div>
    <script src="/assets/js/navbar.js"></script>

    <main>
        <div class="card">
            <div class="header-catalogo">
                <h1>Meus Produtos</h1>
                <div class="nav-links">
                    <a href="../catalogo/catalogo.html">Catálogo</a> | <a href="meusProdutos.html" class="active">Meus Produtos</a>
                </div>
            </div>

            <div class="filtros">
                <span>Filtrar:</span>
                <label>
                    <input type="radio" name="filtro" checked> Todos
                </label>
                <label>
                    <input type="radio" name="filtro"> Só nos quais há interessados
                </label>
            </div>

            <div class="produto-lista" id="myProducts"></div>
            <div id="myProductsEmpty" class="empty-message" style="display:none; text-align:center; padding:24px; color:#555;">Nenhum produto cadastrado.</div>
            <div class="paginacao" id="myProductsPagination"></div>
            <script>
                const myPerPage = 6;
                let myCurrent = 1;
                let myItems = [];
                async function loadMyProducts(page = 1){
                    myCurrent = page;
                    const container = document.getElementById('myProducts');
                    const empty = document.getElementById('myProductsEmpty');
                    const pagination = document.getElementById('myProductsPagination');
                    container.innerHTML = '';
                    pagination.innerHTML = '';
                    try {
                        const response = await fetch('/backend/api/my_products.php', { credentials: 'same-origin' });
                        if (!response.ok) {
                            const error = await response.json().catch(() => null);
                            empty.style.display = 'block';
                            empty.textContent = error?.error || 'Erro ao carregar seus produtos.';
                            return;
                        }
                        myItems = await response.json();
                        if (!myItems.length) { empty.style.display = 'block'; return; }
                        empty.style.display = 'none';
                        const pages = Math.max(1, Math.ceil(myItems.length / myPerPage));
                        const start = (page-1)*myPerPage;
                        const pageItems = myItems.slice(start, start + myPerPage);
                        pageItems.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'produto-item';
                            div.innerHTML = `
                                <div class="produto-imagem"></div>
                                <div class="produto-info">
                                    <h3>${item.title}</h3>
                                    <p>${item.description || ''}</p>
                                </div>
                                <div class="acoes-produto acoes-empilhadas">
                                    <button class="btn btn-principal" onclick="window.location.href='../ofertas-recebidas/ofertas.html'">Ver interesses</button>
                                </div>
                            `;
                            container.appendChild(div);
                        });

                        // pagination
                        function mkLink(p, text, cls){
                            const a = document.createElement('a');
                            a.href = '#'; a.textContent = text || p; if (cls) a.className = cls;
                            a.addEventListener('click', (e)=>{ e.preventDefault(); loadMyProducts(p); });
                            return a;
                        }
                        pagination.appendChild(mkLink(Math.max(1,myCurrent-1), '« Prev', myCurrent===1?'disabled':''));
                        for(let p=1;p<=pages;p++) pagination.appendChild(mkLink(p,p,p===myCurrent?'active':''));
                        pagination.appendChild(mkLink(Math.min(pages,myCurrent+1), 'Next »', myCurrent===pages?'disabled':''));

                    } catch (err) {
                        empty.style.display = 'block';
                        empty.textContent = 'Erro ao carregar seus produtos.';
                    }
                }
                loadMyProducts();
            </script>

            <div class="paginacao">
                <a href="#">&lt;&lt; Prev</a>
                <a href="#">1</a>
                <a href="#">2</a>
                <a href="#">3</a>
                <a href="#">4</a>
                <a href="#">5</a>
                <a href="#">6</a>
                <a href="#">7</a>
                <a href="#">8</a>
                <a href="#">9</a>
                <a href="#">10</a>
                <a href="#">Next &gt;&gt;</a>
            </div>

            <div class="footer-card">
                <button class="btn btn-principal btn-cadastrar-novo" onclick="window.location.href='../cadastro-produto/cadastrar.html'">Cadastrar Novo</button>
            </div>

        </div>
    </main>

    <div class="banner-verde"></div>

</body>
</html>
